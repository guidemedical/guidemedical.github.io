<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Successful — Coact Technologies</title>
  <link rel="stylesheet" href="coact.css" />
</head>
<body class="register-body" style="justify-content:center;align-items:center;display:flex;">

  <div style="text-align:center;padding:2rem;max-width:380px;">

    <div class="success-icon" style="margin-bottom:1.5rem;">
      <a class="brand" href="https://coact.ca">
        <div class="logo"><img src="./images/logo.png" alt="Coact Technologies logo" style="width:100%;height:100%;object-fit:contain;"/></div>
      </a>
    </div>

    <h1 style="font-family:var(--font-sans);font-size:1.75rem;letter-spacing:-0.02em;margin-bottom:0.5rem;">
      Login successful.
    </h1>

    <p id="redirectStatus" style="color:var(--muted);font-size:0.9rem;line-height:1.6;font-weight:300;margin-bottom:2rem;">
      You're signed in to Coact. Redirecting to app in <span id="countdown">3</span> seconds.
    </p>

    <button onclick="window.close()"
            style="background:none;border:1.5px solid var(--rule);border-radius:var(--radius-sm);
                   padding:0.6rem 1.4rem;font-family:var(--font-sans);font-size:0.85rem;
                   color:var(--muted);cursor:pointer;transition:all 0.15s;">
      Close window
    </button>

    <div style="margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--rule);">
      <img src="./images/logoText.png" alt="Coact Technologies"
           style="height:28px;margin:0 auto;opacity:0.4;" />
    </div>

  </div>
</body>

<script>
(function () {
    // Parse query params from Auth0 redirect
    const params = new URLSearchParams(window.location.search);

    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");
    const errorDescription = params.get("error_description");

    const statusEl = document.getElementById("redirectStatus");

    // Handle auth error
    if (error) {
        console.error("Auth error:", error, errorDescription);
        statusEl.textContent = "Login failed.";
        return;
    }
  
    if (!code || !state) {
      statusEl.textContent = "You're signed in to Coact. You may now close this window.";
      return;
    }

    const countdownEl = document.getElementById("countdown");
  
    // Build deep link URL
    const deepLink = new URL("coact://callback");

    if (code) deepLink.searchParams.append("code", code);
    if (state) deepLink.searchParams.append("state", state);

    // Optional: pass error info too
    if (error) deepLink.searchParams.append("error", error);
    if (errorDescription) deepLink.searchParams.append("error_description", errorDescription);

    let seconds = 3;

    const interval = setInterval(() => {
        seconds--;
        if (countdownEl) countdownEl.textContent = seconds;

        if (seconds <= 0) {
            clearInterval(interval);

            statusEl.textContent = "Redirecting now...";

            // Attempt redirect
            window.location.href = deepLink.toString();

            // Fallback message if redirect fails
            setTimeout(() => {
                statusEl.innerHTML = `
                    If nothing happened, 
                    <a href="${deepLink}" style="color:inherit;text-decoration:underline;">
                        click here to open the app
                    </a>.
                `;
            }, 1500);
        }
    }, 1000);
})();
</script>
</html>
