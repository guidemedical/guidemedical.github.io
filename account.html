<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Account – Coact</title>
  <meta name="description" content="Your Coact account" />
  <link rel="stylesheet" href="coact.css" />

  <script defer src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
</head>

<style>
  body {
    visibility: hidden;
  }
</style>

<body>

<header class="container">
  <a class="brand" href="/">
    <div class="logo">
      <img src="./images/logoText.png" alt="Coact Technologies logo" />
    </div>
  </a>
</header>

<main class="container" style="max-width:720px">
  <h2>My Account</h2>
  <p class="muted">Your personal information.</p>

  <div class="panel" style="padding:24px;margin-top:18px">
    <form id="account-form">
      <div class="field">
        <label>Full name</label>
        <input id="full_name" disabled />
      </div>
      <div class="field">
        <label>Email</label>
        <input id="email" disabled />
      </div>
      <div class="field">
        <label>License status</label>
        <input id="license_status" disabled />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Concurrent sessions</label>
          <input id="license_num_sessions" disabled />
        </div>
        <div class="field">
          <label>Active sessions</label>
          <input id="num_current" disabled />
        </div>
      </div>
      <div class="field">
        <label>License expiry</label>
        <input id="license_expires" disabled />
      </div>
      <div id="status" class="alert"></div>
    </form>
    <div style="margin-top:20px;text-align:right">
      <button id="save-btn" class="btn-secondary" disabled>Save Changes</button>
    </div>
    <div style="margin-top:20px;text-align:right">
      <button id="logout-btn" class="btn-secondary">Log out</button>
    </div>
  </div>
</main>

<script>
/*****************************************************************
 * AUTH0 CONFIG (REFRESH TOKEN ENABLED)
 *****************************************************************/
const auth0Config = {
  domain: 'auth.coact.ca',
  clientId: 'PnUGLA2LRadsgi0rwSdWQUEoTM6xAhxT',

  // Enables rotating refresh tokens
  cacheLocation: 'localstorage',
  useRefreshTokens: true,

  authorizationParams: {
    redirect_uri: window.location.origin + '/account.html',
    audience: 'https://api.coact.ca',
    scope: 'openid profile email offline_access'
  }
};

const fields = {
  fullName: document.getElementById("full_name"),
  email: document.getElementById("email"),
  licenseStatus: document.getElementById("license_status"),
  licenseNumSessions: document.getElementById("license_num_sessions"),
  numCurrent: document.getElementById("num_current"),
  licenseExpires: document.getElementById("license_expires"),
};

let auth0Client;
let accessToken;
let originalData = {};

function snapshotForm() {
  originalData = {
    full_name: fields.fullName.value,
    email: fields.email.value,
    license_status: fields.licenseStatus.value,
    license_num_sessions: fields.licenseNumSessions.value,
    num_current: fields.numCurrent.value,
    license_expires: fields.licenseExpires.value
  };
}

function hasChanges() {
  return (
    fields.fullName.value !== originalData.full_name ||
    fields.email.value !== originalData.email ||
    fields.licenseStatus.value !== originalData.license_status ||
    fields.licenseNumSessions.value !== originalData.license_num_sessions ||
    fields.numCurrent.value !== originalData.num_current ||
    fields.licenseExpires.value !== originalData.license_expires
  );
}

function updateSaveButton() {
  document.getElementById('save-btn').disabled = !hasChanges();
}

/*****************************************************************
 * AUTH FLOW
 *****************************************************************/
window.addEventListener("load", async () => {
  auth0Client = await window.auth0.createAuth0Client(auth0Config);

  // Handle redirect callback
  if (window.location.search.includes('code=') && window.location.search.includes('state=')) {
    await auth0Client.handleRedirectCallback();
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  // Force login
  if (!await auth0Client.isAuthenticated()) {
    return auth0Client.loginWithRedirect();
  }

  // Silently refresh access token when expired
  accessToken = await auth0Client.getTokenSilently({
    authorizationParams: {
      audience: 'https://api.coact.ca'
    }
  });

  const user = await auth0Client.getUser();

  document.body.style.visibility = "visible";
  fields.email.value = user.email || '';
  loadUserFromAPI();
  snapshotForm();

  document.getElementById('save-btn').disabled = true;
});

/*****************************************************************
 * BACKEND API
 *****************************************************************/
async function apiFetch(path, options = {}) {
  return fetch(`https://api.coact.ca${path}`, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${accessToken}`
    }
  });
}

async function loadUserFromAPI() {
  const res = await apiFetch('/me');

  if (res.status === 400) {
    showStatus('Welcome! Please confirm your details.', 'success');
    enableFields();
    return;
  }

  if (!res.ok) {
    showStatus('Failed to load account', 'error');
    return;
  }

  const user = await res.json();

  fields.fullName.value = user.full_name || '';
  fields.licenseStatus.value = user.license_status || '';
  fields.licenseNumSessions.value = user.license_num_sessions || 0;
  fields.numCurrent.value = user.num_current || 0;
  fields.licenseExpires.value = new Date(user.license_expires * 1000).toLocaleDateString() || '-';

  enableFields();
}

function enableFields() {
  //fields.email.disabled = false;
  fields.fullName.disabled = false;
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = `alert visible ${type}`;
}

document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", updateSaveButton);
  });

document.getElementById('logout-btn').onclick = () => {
  auth0Client.logout({
    logoutParams: {
      returnTo: window.location.origin
    }
  });
};

document.getElementById("save-btn").addEventListener("click", async () => {
  const payload = {
    full_name: fields.fullName.value,
    email: fields.email.value,
  };

  const res = await apiFetch("/newuser", {
    method: "POST",
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    showStatus("Failed to save", "error");
    return;
  }

  showStatus("Saved successfully", "success");

  // Reset baseline so button disables again
  snapshotForm();
  updateSaveButton();
});
</script>
</body>
</html>
